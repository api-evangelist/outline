components:
  responses:
    RateLimited:
      description: The request was rate limited.
      headers:
        Retry-After:
          $ref: '#/components/headers/Retry-After'
        RateLimit-Limit:
          $ref: '#/components/headers/RateLimit-Limit'
        RateLimit-Remaining:
          $ref: '#/components/headers/RateLimit-Remaining'
        RateLimit-Reset:
          $ref: '#/components/headers/RateLimit-Reset'
      content:
        application/json:
          schema:
            type: object
            properties:
              ok:
                type: boolean
                example: false
              error:
                type: string
                example: rate_limit_exceeded
              status:
                type: number
                example: 429
    Validation:
      description: The request failed one or more validations.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The specified resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthenticated:
      description: The API key is missing or otherwise invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: The current API key is not authorized to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Document:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the object.
          readOnly: true
          format: uuid
        collectionId:
          type: string
          description: Identifier for the associated collection.
          format: uuid
          nullable: true
        parentDocumentId:
          type: string
          description: Identifier for the document this is a child of, if any.
          format: uuid
          nullable: true
        title:
          type: string
          description: The title of the document.
          example: Welcome to Acme Inc
        fullWidth:
          type: boolean
          description: Whether this document should be displayed in a full-width view.
        icon:
          type: string
          nullable: true
          description: An emoji or icon associated with the document.
          example: 🎉
        color:
          type: string
          nullable: true
          description: The color of the document icon in hex format.
        text:
          type: string
          description: The text content of the document, contains markdown formatting
          example: …
        data:
          type: object
          nullable: true
          description: The body of the document as a Prosemirror document, returned in place of text when requested.
        url:
          type: string
          description: A URL path to access the document.
          readOnly: true
        urlId:
          type: string
          description: A short unique ID that can be used to identify the document as an alternative to the UUID
          example: hDYep1TPAM
        collaboratorIds:
          type: array
          description: Identifiers of users who have edited the document.
          items:
            type: string
            format: uuid
        tasks:
          type: object
          description: Task completion counts for the document.
          properties:
            completed:
              type: number
            total:
              type: number
        templateId:
          type: string
          description: Unique identifier for the template this document was created from, if any
          format: uuid
        revision:
          type: number
          description: A number that is auto incrementing with every revision of the document that is saved
          readOnly: true
        createdAt:
          type: string
          description: The date and time that this object was created
          readOnly: true
          format: date-time
        createdBy:
          $ref: '#/components/schemas/User'
        updatedAt:
          type: string
          description: The date and time that this object was last changed
          readOnly: true
          format: date-time
        updatedBy:
          $ref: '#/components/schemas/User'
        publishedAt:
          type: string
          nullable: true
          description: The date and time that this object was published
          readOnly: true
          format: date-time
        dataAttributes:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/DocumentDataAttribute'
        archivedAt:
          type: string
          nullable: true
          description: The date and time that this object was archived
          readOnly: true
          format: date-time
        deletedAt:
          type: string
          nullable: true
          description: The date and time that this object was deleted
          readOnly: true
          format: date-time
    Ability:
      description: A single permission granted by a policy
      example: true
      oneOf:
      - type: array
        items:
          type: string
      - type: boolean
    Pagination:
      type: object
      properties:
        offset:
          type: number
          example: 0
        limit:
          type: number
          example: 25
    SearchResult:
      type: object
      properties:
        id:
          type: string
          readOnly: true
          format: uuid
        query:
          type: string
          description: The user-provided search query
          example: What is our hiring policy?
          readOnly: true
        answer:
          type: string
          description: An answer to the query, if possible
          example: Our hiring policy can be summarized as…
          readOnly: true
        source:
          type: string
          example: app
          description: The source of the query
          readOnly: true
          enum:
          - api
          - app
        createdAt:
          type: string
          description: The date and time that this object was created
          readOnly: true
          format: date-time
    UserRole:
      type: string
      enum:
      - admin
      - member
      - viewer
      - guest
    TextEditMode:
      type: string
      description: The editing mode for text updates to a document. When set to `patch`, the `findText` parameter is required and the existing occurrence of `findText` will be replaced with the value of `text`.
      enum:
      - append
      - prepend
      - replace
      - patch
    Collection:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the object.
          readOnly: true
          format: uuid
        url:
          type: string
          description: The relative URL path at which the collection can be accessed.
          readOnly: true
        urlId:
          type: string
          description: A short unique identifier that can be used to identify the collection instead of the UUID.
          readOnly: true
          example: hDYep1TPAM
        name:
          type: string
          description: The name of the collection.
          example: Human Resources
        description:
          type: string
          nullable: true
          description: A description of the collection, may contain markdown formatting
          example: ''
        data:
          type: object
          nullable: true
          description: The collection description as rich-text JSON, when available.
        sort:
          type: object
          description: The sort of documents in the collection. Note that not all API responses respect this and it is left as a frontend concern to implement.
          properties:
            field:
              type: string
            direction:
              type: string
              enum:
              - asc
              - desc
        index:
          type: string
          nullable: true
          description: The position of the collection in the sidebar
          example: P
        color:
          type: string
          nullable: true
          description: 'A color representing the collection, this is used to help make collections more identifiable in the UI. It should be in HEX format including the #'
          example: '#123123'
        icon:
          type: string
          nullable: true
          description: A string that represents an icon in the outline-icons package or an emoji
        permission:
          $ref: '#/components/schemas/Permission'
        templateManagement:
          $ref: '#/components/schemas/Permission'
        sharing:
          type: boolean
          description: Whether public document sharing is enabled in this collection
          default: false
        commenting:
          type: boolean
          nullable: true
          description: Whether commenting is enabled in this collection
        createdAt:
          type: string
          description: The date and time that this object was created
          readOnly: true
          format: date-time
        updatedAt:
          type: string
          description: The date and time that this object was last changed
          readOnly: true
          format: date-time
        deletedAt:
          type: string
          nullable: true
          description: The date and time that this object was deleted
          readOnly: true
          format: date-time
        archivedAt:
          type: string
          nullable: true
          description: The date and time that this object was archived
          readOnly: true
          format: date-time
        archivedBy:
          $ref: '#/components/schemas/User'
        sourceMetadata:
          type: object
          nullable: true
          description: Metadata about the external source this collection was imported from, if any.
          properties:
            externalId:
              type: string
            externalName:
              type: string
            createdByName:
              type: string
    Group:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the object.
          readOnly: true
          format: uuid
        name:
          type: string
          description: The name of this group.
          example: Engineering
        description:
          type: string
          nullable: true
          description: A short description of this group.
        externalId:
          type: string
          nullable: true
          description: An identifier for this group in an external system, if linked.
        disableMentions:
          type: boolean
          description: Whether mentioning this group is disabled.
        externalGroup:
          type: object
          nullable: true
          description: Details of the linked external group, if any.
        memberCount:
          type: number
          description: The number of users that are members of the group
          example: 11
          readOnly: true
        createdAt:
          type: string
          description: The date and time that this object was created
          readOnly: true
          format: date-time
        updatedAt:
          type: string
          description: The date and time that this object was last changed
          readOnly: true
          format: date-time
    Template:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the object.
          readOnly: true
          format: uuid
        url:
          type: string
          description: A URL path to access the template.
          readOnly: true
        urlId:
          type: string
          description: A short unique identifier for the template used in URLs.
          readOnly: true
        title:
          type: string
          description: The title of the template.
        data:
          type: object
          description: The body of the template as a Prosemirror document.
        icon:
          type: string
          description: An emoji to use as the template icon.
          nullable: true
        color:
          type: string
          description: The color of the template icon in hex format.
          nullable: true
        fullWidth:
          type: boolean
          description: Whether the template should be displayed full width.
        collectionId:
          type: string
          description: Identifier for the associated collection, if any.
          format: uuid
          nullable: true
        createdAt:
          type: string
          description: The date and time that the template was created.
          readOnly: true
          format: date-time
        createdBy:
          $ref: '#/components/schemas/User'
        updatedAt:
          type: string
          description: The date and time that the template was last changed.
          readOnly: true
          format: date-time
        updatedBy:
          $ref: '#/components/schemas/User'
        deletedAt:
          type: string
          description: The date and time that the template was deleted.
          readOnly: true
          format: date-time
          nullable: true
        publishedAt:
          type: string
          nullable: true
          description: The date and time that the template was published.
          readOnly: true
          format: date-time
    NavigationNode:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the document.
          format: uuid
        title:
          type: string
        url:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/NavigationNode'
    Sorting:
      type: object
      properties:
        sort:
          type: string
          example: updatedAt
        direction:
          type: string
          example: DESC
          enum:
          - ASC
          - DESC
    Permission:
      type: string
      enum:
      - read
      - read_write
    DocumentInsight:
      type: object
      description: A rollup of activity counts for a document over a daily or weekly period.
      properties:
        date:
          type: string
          format: date
          description: The UTC day the rollup represents. For weekly rollups this is the first day (Monday) of the week.
        period:
          type: string
          description: The length of time the rollup covers. Daily rollups are stored for recent activity, older rollups are aggregated into weekly buckets.
          enum:
          - day
          - week
        viewCount:
          type: integer
          description: Total number of document views on this day.
        viewerCount:
          type: integer
          description: Number of unique viewers on this day.
        commentCount:
          type: integer
          description: Total comments made on this day.
        reactionCount:
          type: integer
          description: Total reactions added on this day.
        revisionCount:
          type: integer
          description: Number of document revisions on this day.
        editorCount:
          type: integer
          description: Number of unique editors on this day.
    Membership:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the object.
          readOnly: true
        userId:
          type: string
          description: Identifier for the associated user.
          readOnly: true
          format: uuid
        documentId:
          type: string
          description: Identifier for the associated document, if any.
          readOnly: true
          format: uuid
          nullable: true
        collectionId:
          type: string
          description: Identifier for the associated collection, if any.
          readOnly: true
          format: uuid
          nullable: true
        permission:
          $ref: '#/components/schemas/Permission'
        createdById:
          type: string
          description: Identifier for the user who created this membership.
          readOnly: true
          format: uuid
        sourceId:
          type: string
          description: Identifier for the membership this one was inherited from, if any.
          readOnly: true
          format: uuid
          nullable: true
        index:
          type: string
          description: The position of the collection in the user's sidebar.
          nullable: true
    User:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the object.
          readOnly: true
          format: uuid
        name:
          type: string
          description: The name of this user, it is migrated from Slack or Google Workspace when the SSO connection is made but can be changed if necessary.
          example: Jane Doe
        avatarUrl:
          type: string
          format: uri
          description: The URL for the image associated with this user, it will be displayed in the application UI and email notifications.
        color:
          type: string
          description: A color representing the user, used in the UI for avatars without an image.
          readOnly: true
        email:
          type: string
          description: The email associated with this user, it is migrated from Slack or Google Workspace when the SSO connection is made but can be changed if necessary.
          format: email
          readOnly: true
        role:
          $ref: '#/components/schemas/UserRole'
        isSuspended:
          type: boolean
          description: Whether this user has been suspended.
          readOnly: true
        lastActiveAt:
          type: string
          nullable: true
          description: The last time this user made an API request, this value is updated at most every 5 minutes.
          readOnly: true
          format: date-time
        timezone:
          type: string
          nullable: true
          description: The timezone this user has registered.
        createdAt:
          type: string
          description: The date and time that this user first signed in or was invited as a guest.
          readOnly: true
          format: date-time
        updatedAt:
          type: string
          description: The date and time that this user was last updated.
          readOnly: true
          format: date-time
        deletedAt:
          type: string
          nullable: true
          description: The date and time that this user was deleted, if applicable.
          readOnly: true
          format: date-time
    Error:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
        message:
          type: string
        status:
          type: number
        data:
          type: object
    DocumentDataAttribute:
      type: object
      properties:
        dataAttributeId:
          type: string
          description: Unique identifier for the associated data attribute.
          format: uuid
        value:
          description: The value of the data attribute for this document.
          example: In Progress
          oneOf:
          - type: string
          - type: boolean
          - type: number
        updatedAt:
          type: string
          description: The date and time that this object attribute was last changed
          readOnly: true
          format: date-time
    CollectionGroupMembership:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the object.
          readOnly: true
        groupId:
          type: string
          description: Identifier for the associated group.
          readOnly: true
          format: uuid
        documentId:
          type: string
          description: Identifier for the associated document, if any.
          readOnly: true
          format: uuid
          nullable: true
        collectionId:
          type: string
          description: Identifier for the associated collection, if any.
          readOnly: true
          format: uuid
          nullable: true
        permission:
          $ref: '#/components/schemas/Permission'
        sourceId:
          type: string
          description: Identifier for the membership this one was inherited from, if any.
          readOnly: true
          format: uuid
          nullable: true
    Policy:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the object this policy references.
          format: uuid
          readOnly: true
        abilities:
          type: object
          description: The abilities that are allowed by this policy, if an array is returned then the individual ID's in the array represent the memberships that grant the ability.
          additionalProperties:
            $ref: '#/components/schemas/Ability'
          example:
            read: true
            update: true
            delete: false
  headers:
    RateLimit-Limit:
      schema:
        type: integer
      description: The maximum requests available in the current duration.
    RateLimit-Remaining:
      schema:
        type: integer
      description: How many requests are left in the current duration.
    RateLimit-Reset:
      schema:
        type: string
      description: Timestamp in the future the duration will reset.
    Retry-After:
      schema:
        type: integer
      description: Seconds in the future to retry the request, if rate limited.
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://app.getoutline.com/oauth/authorize
          tokenUrl: https://app.getoutline.com/oauth/token
          refreshUrl: https://app.getoutline.com/oauth/token
          scopes:
            read: Read access
            write: Write access
